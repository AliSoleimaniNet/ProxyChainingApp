name: Ultimate ProxyChainer Build & Deploy

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

env:
  UV_PYTHON: "3.12"
  PYTHONUTF8: 1
  FLET_CLI_NO_RICH_OUTPUT: 1

jobs:
  build_apps:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            runner: windows-latest
            build_cmd: "flet build windows"
            artifact_path: build/windows
          
          - name: apk
            runner: ubuntu-latest
            build_cmd: "flet build apk"
            artifact_path: build/apk

          - name: web
            runner: ubuntu-latest
            build_cmd: "flet build web --base-url /${{ github.event.repository.name }}/"
            artifact_path: build/web

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Java (Android Build Requirement)
        if: matrix.name == 'apk'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: uv pip install flet requests

      - name: Build App
        run: uv run ${{ matrix.build_cmd }} --yes

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-artifact
          path: ${{ matrix.artifact_path }}

  deploy_web:
    name: Deploy to GitHub Pages 🚀
    needs: build_apps
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - name: Download Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-artifact
          path: web-dist

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-dist

      - name: Deploy
        uses: actions/deploy-pages@v4

  create_release:
    name: Create GitHub Release 📦
    needs: build_apps
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Prepare Release Files
        run: |
          mkdir -p release-files
          find all-artifacts -name "*.exe" -exec cp {} release-files/ProxyChainer-Windows.exe \;
          find all-artifacts -name "*.apk" -exec cp {} release-files/ProxyChainer-Android.apk \;
          ls -R release-files/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          generate_release_notes: true